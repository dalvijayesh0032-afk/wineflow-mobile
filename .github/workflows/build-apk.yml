name: Build WineFlow APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      api_base:
        description: 'API base URL (your server)'
        required: false
        default: 'http://10.0.2.2:4000'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Scaffold Android project
        run: flutter create --platforms=android --org com.wineflow .

      - name: Inject Android permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q ACCESS_FINE_LOCATION $MANIFEST || sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <application#' $MANIFEST

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          API_BASE="${{ github.event.inputs.api_base || 'http://10.0.2.2:4000' }}"
          flutter build apk --release --dart-define=API_BASE=$API_BASE
          cp build/app/outputs/flutter-apk/app-release.apk WineFlow.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WineFlow-apk
          path: WineFlow.apk
