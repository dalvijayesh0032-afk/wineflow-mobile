name: wineflow
description: WineFlow field app — offline-first attendance, GPS, visits, orders, collections.
publish_to: 'none'
version: 1.1.0+2
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  geolocator: ^12.0.0
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3            # local offline queue (outbox)
  path: ^1.9.0
  connectivity_plus: ^6.0.3  # reconnect trigger
  uuid: ^4.4.0               # idempotency keys for safe retries
flutter:
  uses-material-design: true
